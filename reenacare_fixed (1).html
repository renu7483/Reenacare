<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>ReenaCare</title>
<script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-auth-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-firestore-compat.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/react/18.2.0/umd/react.production.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/react-dom/18.2.0/umd/react-dom.production.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/babel-standalone/7.23.2/babel.min.js"></script>
<link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,300;0,400;1,300;1,400&family=DM+Sans:wght@300;400;500&display=swap" rel="stylesheet"/>
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
:root{--rose:#c4768e;--deep:#7a3f55;--text:#3d2030;--muted:#9a7080;--bg:linear-gradient(160deg,#f5e8f0 0%,#efe0e8 40%,#fce8d8 100%);--card:rgba(255,255,255,0.88)}
body{font-family:'DM Sans',sans-serif;background:var(--bg);min-height:100vh}
input,select,textarea,button{font-family:'DM Sans',sans-serif}
*,*::before,*::after{box-sizing:border-box}

/* AUTH */
.auth-wrap{min-height:100vh;display:grid;grid-template-columns:1fr 1fr}
.auth-left{background:linear-gradient(145deg,#f5dce4,#e8c5d0 40%,#d4a0b5);display:flex;flex-direction:column;align-items:center;justify-content:center;padding:60px 50px;position:relative;overflow:hidden}
.auth-left::after{content:'🌸';position:absolute;font-size:200px;opacity:.07;bottom:-30px;right:-30px;transform:rotate(-15deg)}
.auth-brand{font-family:'Cormorant Garamond',serif;font-size:3.8rem;font-weight:300;color:var(--deep);text-align:center;position:relative;z-index:2}
.auth-brand span{font-style:italic;opacity:.75}
.auth-tagline{font-size:.82rem;color:var(--deep);opacity:.65;text-align:center;margin-top:10px;position:relative;z-index:2;letter-spacing:3px;text-transform:uppercase}
.auth-quote{font-family:'Cormorant Garamond',serif;font-size:1.2rem;font-style:italic;color:var(--deep);text-align:center;opacity:.75;margin-top:48px;max-width:340px;line-height:1.6;position:relative;z-index:2}
.auth-features{margin-top:40px;position:relative;z-index:2;display:flex;flex-direction:column;gap:12px}
.auth-feature{display:flex;align-items:center;gap:10px;font-size:.85rem;color:var(--deep);opacity:.8}
.auth-right{background:#fdf8f5;display:flex;flex-direction:column;align-items:center;justify-content:center;padding:60px 50px}
.auth-form{width:100%;max-width:400px}
.auth-tabs{display:flex;margin-bottom:32px;background:#f0e6ea;border-radius:12px;padding:4px}
.auth-tab{flex:1;padding:10px;text-align:center;border-radius:9px;cursor:pointer;font-size:.88rem;font-weight:500;color:var(--muted);transition:all .2s;border:none;background:transparent}
.auth-tab.active{background:white;color:var(--deep);box-shadow:0 2px 8px rgba(122,63,85,.1)}
.auth-title{font-family:'Cormorant Garamond',serif;font-size:2rem;color:var(--deep);margin-bottom:6px}
.auth-sub{font-size:.86rem;color:var(--muted);margin-bottom:26px}
.rc-input{width:100%;padding:13px 16px;border:1.5px solid #e2cfd5;border-radius:12px;font-size:.95rem;color:var(--text);background:white;outline:none;transition:border-color .2s;margin-bottom:13px;display:block}
.rc-input:focus{border-color:var(--rose)}
.input-wrap{position:relative}
.input-wrap .rc-input{padding-right:42px}
.eye-btn{position:absolute;right:13px;top:16px;background:none;border:none;cursor:pointer;color:var(--muted);font-size:1rem;padding:0}
.error-box{background:#ffeef2;border:1px solid #f5c0c8;border-radius:10px;padding:11px 14px;font-size:.84rem;color:#c0485a;margin-bottom:14px;line-height:1.5}
.success-box{background:#eefff5;border:1px solid #b0f0cb;border-radius:10px;padding:11px 14px;font-size:.84rem;color:#1a7a45;margin-bottom:14px}
.btn-rose{padding:14px 30px;background:linear-gradient(135deg,#c4768e,#7a3f55);color:white;border:none;border-radius:50px;font-size:.93rem;font-weight:500;cursor:pointer;box-shadow:0 4px 18px rgba(122,63,85,.28);transition:transform .2s;display:inline-flex;align-items:center;justify-content:center;gap:7px;width:100%}
.btn-rose:hover{transform:translateY(-2px)}
.btn-rose:disabled{opacity:.6;cursor:not-allowed;transform:none}
.btn-outline{padding:12px 24px;background:transparent;color:var(--deep);border:1.5px solid rgba(196,118,142,.38);border-radius:50px;font-size:.9rem;cursor:pointer;transition:all .2s;display:inline-flex;align-items:center;gap:7px}
.btn-outline:hover{border-color:var(--rose);background:rgba(196,118,142,.07)}
.divider{display:flex;align-items:center;gap:12px;margin:18px 0}
.divider-line{flex:1;height:1px;background:#e2cfd5}
.divider-text{font-size:.75rem;color:var(--muted);text-transform:uppercase;letter-spacing:1px}
.google-btn{width:100%;padding:12px;background:white;border:1.5px solid #e2cfd5;border-radius:12px;font-size:.93rem;color:var(--text);cursor:pointer;display:flex;align-items:center;justify-content:center;gap:9px;transition:border-color .2s}
.google-btn:hover{border-color:var(--rose)}
.forgot{text-align:right;font-size:.78rem;color:var(--rose);cursor:pointer;margin-bottom:16px;display:block}
.auth-footer{text-align:center;font-size:.8rem;color:var(--muted);margin-top:20px}
.auth-footer a{color:var(--rose);cursor:pointer}
.strength{display:flex;gap:4px;margin-bottom:8px;margin-top:-8px}
.strength-bar{flex:1;height:3px;border-radius:2px;background:#e2cfd5;transition:background .3s}
.strength-bar.weak{background:#e55}
.strength-bar.fair{background:#fa0}
.strength-bar.strong{background:#4c4}
.strength-label{font-size:.72rem;color:var(--muted);margin-bottom:10px}

/* NAV */
.rc-nav{position:sticky;top:0;padding:12px 28px;display:flex;align-items:center;justify-content:space-between;background:rgba(255,255,255,.85);backdrop-filter:blur(14px);border-bottom:1px solid rgba(196,118,142,.15);z-index:100}
.rc-brand{font-family:'Cormorant Garamond',serif;font-size:1.65rem;font-weight:300;color:var(--deep)}
.rc-brand span{color:var(--rose);font-style:italic}
.nav-links{display:flex;gap:4px;align-items:center;flex-wrap:wrap}
.nav-btn{padding:7px 12px;border-radius:50px;font-size:.78rem;color:var(--text);background:transparent;border:none;cursor:pointer;transition:background .2s,color .2s;white-space:nowrap}
.nav-btn:hover{background:rgba(196,118,142,.13)}
.nav-btn.active{background:var(--rose);color:white}
.nav-avatar{width:34px;height:34px;border-radius:50%;background:linear-gradient(135deg,#e8c5d0,#c4768e);display:flex;align-items:center;justify-content:center;font-size:.85rem;color:white;font-weight:600;cursor:pointer;margin-left:6px;border:2px solid white;box-shadow:0 2px 8px rgba(122,63,85,.15);position:relative;flex-shrink:0}
.user-menu{position:absolute;top:44px;right:0;background:white;border-radius:14px;box-shadow:0 8px 30px rgba(122,63,85,.14);padding:8px;min-width:200px;z-index:200;border:1px solid rgba(196,118,142,.12)}
.user-menu-name{padding:10px 12px 6px;font-size:.82rem;color:var(--muted);border-bottom:1px solid #f0e6ea;margin-bottom:4px}
.user-menu-name strong{display:block;color:var(--deep);font-size:.93rem}
.user-menu-item{padding:9px 12px;border-radius:9px;font-size:.85rem;color:var(--text);cursor:pointer;display:flex;align-items:center;gap:8px;transition:background .15s}
.user-menu-item:hover{background:#fdf0f4}
.user-menu-item.danger{color:#c0485a}
.user-menu-item.danger:hover{background:#ffeef2}
.lang-switcher{display:flex;gap:4px;background:#f0e6ea;border-radius:20px;padding:3px}
.lang-btn{padding:5px 10px;border-radius:16px;border:none;background:transparent;font-size:.75rem;cursor:pointer;color:var(--muted);transition:all .2s}
.lang-btn.active{background:var(--rose);color:white}

/* PAGES */
.rc-page{padding:32px 24px 60px;max-width:900px;margin:0 auto}
.rc-page-header{text-align:center;margin-bottom:40px}
.rc-label{font-size:.76rem;letter-spacing:4px;text-transform:uppercase;color:var(--rose);margin-bottom:8px}
.rc-page-title{font-family:'Cormorant Garamond',serif;font-size:2.8rem;font-weight:300;color:var(--deep);margin-bottom:8px}
.rc-page-sub{font-size:.93rem;color:var(--muted)}
.rc-card{background:var(--card);backdrop-filter:blur(10px);border:1px solid rgba(255,255,255,.9);border-radius:20px;padding:28px;box-shadow:0 4px 24px rgba(122,63,85,.07);margin-bottom:20px}
.rc-card-title{font-family:'Cormorant Garamond',serif;font-size:1.45rem;color:var(--deep);margin-bottom:18px;display:flex;align-items:center;gap:8px}
.form-label{display:block;font-size:.77rem;font-weight:500;color:var(--muted);text-transform:uppercase;letter-spacing:1px;margin-bottom:7px}
.form-group{margin-bottom:18px}
.rc-select{width:100%;padding:12px 14px;border:1.5px solid #e2cfd5;border-radius:10px;font-size:.93rem;color:var(--text);background:white;outline:none;transition:border-color .2s}
.rc-select:focus{border-color:var(--rose)}

/* HERO */
.rc-hero{min-height:calc(100vh - 60px);display:flex;flex-direction:column;align-items:center;justify-content:center;text-align:center;padding:60px 24px;position:relative;overflow:hidden}
.rc-orb{position:fixed;border-radius:50%;filter:blur(70px);opacity:.25;pointer-events:none;animation:rcDrift 9s ease-in-out infinite}
.rc-orb1{width:380px;height:380px;background:#e8c5d5;top:-80px;right:-80px}
.rc-orb2{width:280px;height:280px;background:#c5d5e8;bottom:80px;left:-60px;animation-delay:3s}
.rc-orb3{width:220px;height:220px;background:#d5e8c5;top:40%;left:55%;animation-delay:1.5s}
@keyframes rcDrift{0%,100%{transform:translate(0,0) scale(1)}50%{transform:translate(18px,-18px) scale(1.04)}}
.rc-greeting{font-size:.85rem;letter-spacing:4px;text-transform:uppercase;color:var(--rose);margin-bottom:18px}
.rc-hero-title{font-family:'Cormorant Garamond',serif;font-size:clamp(2.8rem,8vw,5.5rem);font-weight:300;color:var(--deep);line-height:1.1;margin-bottom:22px}
.rc-hero-title em{font-style:italic;color:var(--rose)}
.rc-hero-sub{font-size:1.1rem;color:var(--muted);max-width:580px;line-height:1.7;font-weight:300;margin-bottom:44px}
.cta-group{display:flex;gap:14px;flex-wrap:wrap;justify-content:center}
.aff-section{padding:60px 24px;text-align:center}
.section-title{font-family:'Cormorant Garamond',serif;font-size:2.2rem;font-weight:300;color:var(--deep);margin-bottom:40px}
.aff-card{background:rgba(255,255,255,.78);border:1px solid rgba(196,118,142,.18);border-radius:24px;padding:46px 54px;max-width:680px;margin:0 auto;min-height:160px;display:flex;align-items:center;justify-content:center}
.aff-text{font-family:'Cormorant Garamond',serif;font-size:1.8rem;font-style:italic;color:var(--text);line-height:1.5;transition:opacity .4s}
.aff-text.fading{opacity:0}
.aff-nav{display:flex;justify-content:center;gap:7px;margin-top:20px}
.dot{width:8px;height:8px;border-radius:50%;background:rgba(196,118,142,.28);cursor:pointer;border:none;transition:all .2s}
.dot.active{background:var(--rose);width:24px;border-radius:4px}
.features{padding:20px 24px 60px;max-width:900px;margin:0 auto}
.features-grid{display:grid;grid-template-columns:repeat(auto-fit,minmax(200px,1fr));gap:16px}
.feature-card{background:rgba(255,255,255,.82);border:1px solid rgba(255,255,255,.9);border-radius:20px;padding:24px;cursor:pointer;transition:transform .25s,box-shadow .25s;border-top:3px solid transparent}
.feature-card:hover{transform:translateY(-4px);box-shadow:0 12px 36px rgba(122,63,85,.11);border-top-color:var(--rose)}
.feature-icon{font-size:2.3rem;margin-bottom:12px}
.feature-name{font-family:'Cormorant Garamond',serif;font-size:1.3rem;color:var(--deep);margin-bottom:6px}
.feature-desc{font-size:.83rem;color:var(--muted);line-height:1.6}

/* TRACKER */
.tracker-grid{display:grid;grid-template-columns:1fr 1fr;gap:20px;margin-bottom:24px}
.ring-wrap{text-align:center;padding:24px;display:flex;flex-direction:column;align-items:center;justify-content:center;height:100%}
.ring-container{position:relative;width:150px;height:150px;margin:0 auto 14px}
.ring-svg{transform:rotate(-90deg)}
.ring-days{font-family:'Cormorant Garamond',serif;font-size:2.4rem;color:var(--deep);line-height:1}
.ring-label{font-size:.68rem;color:var(--muted);text-transform:uppercase;letter-spacing:1px}
.ring-text{position:absolute;top:50%;left:50%;transform:translate(-50%,-50%);text-align:center}
.result-grid{display:grid;grid-template-columns:repeat(auto-fit,minmax(150px,1fr));gap:14px;margin-bottom:22px}
.result-pill{background:white;border-radius:16px;padding:18px;text-align:center;border:1px solid rgba(196,118,142,.13)}
.result-pill .val{font-family:'Cormorant Garamond',serif;font-size:1.4rem;color:var(--deep)}
.result-pill .key{font-size:.73rem;color:var(--muted);text-transform:uppercase;letter-spacing:1px;margin-top:3px}
.result-pill .ico{font-size:1.6rem;margin-bottom:6px}
.cal-grid{display:grid;grid-template-columns:repeat(7,1fr);gap:3px}
.cal-day-name{text-align:center;font-size:.7rem;color:var(--muted);font-weight:500;padding:4px 0}
.cal-day{text-align:center;padding:7px 3px;border-radius:8px;font-size:.83rem}
.cal-day.today{background:rgba(196,118,142,.14);color:var(--rose);font-weight:500}
.cal-day.period{background:var(--rose);color:white;border-radius:50%}
.cal-day.fertile{background:rgba(100,180,150,.25);color:#2d7a5a}
.cal-day.ovulation{background:#9b59b6;color:white;border-radius:50%}
.cal-legend{display:flex;gap:14px;flex-wrap:wrap;margin-top:10px;font-size:.76rem;color:var(--muted)}
.legend-dot{width:9px;height:9px;border-radius:50%;display:inline-block;margin-right:4px}
.tip-box{background:linear-gradient(135deg,rgba(196,118,142,.09),rgba(122,63,85,.04));border:1px solid rgba(196,118,142,.18);border-radius:14px;padding:16px 20px;margin-top:18px;font-size:.86rem;color:var(--text);line-height:1.7}
.tip-box strong{color:var(--rose)}

/* SYMPTOMS */
.symptom-grid{display:flex;flex-wrap:wrap;gap:9px}
.symptom-pill{padding:9px 16px;background:white;border:1.5px solid #e2cfd5;border-radius:50px;font-size:.86rem;cursor:pointer;transition:all .2s;user-select:none}
.symptom-pill.selected{background:var(--rose);color:white;border-color:var(--rose)}
.mood-grid{display:flex;gap:10px;flex-wrap:wrap}
.mood-option{text-align:center;cursor:pointer;padding:11px 14px;border-radius:14px;border:1.5px solid #e2cfd5;background:white;transition:all .2s;min-width:66px}
.mood-option.selected{border-color:var(--rose);background:rgba(196,118,142,.1)}
.mood-name{font-size:.7rem;color:var(--muted);margin-top:3px}
.mood-option.selected .mood-name{color:var(--rose)}
.care-message{background:linear-gradient(135deg,rgba(196,118,142,.11),rgba(122,63,85,.05));border-left:3px solid var(--rose);border-radius:0 16px 16px 0;padding:18px 22px;margin-bottom:20px;font-family:'Cormorant Garamond',serif;font-size:1.2rem;font-style:italic;color:var(--text);line-height:1.6}
.care-grid{display:grid;grid-template-columns:1fr 1fr;gap:14px}
.care-card{background:white;border-radius:14px;padding:18px;border:1px solid rgba(196,118,142,.1)}
.care-card-title{font-weight:600;font-size:.82rem;color:var(--deep);margin-bottom:10px;text-transform:uppercase;letter-spacing:.5px}
.care-items{list-style:none}
.care-items li{font-size:.86rem;color:var(--text);padding:5px 0;border-bottom:1px solid #f5ecf0;line-height:1.5;display:flex;gap:7px}
.care-items li:last-child{border-bottom:none}
.care-items li::before{content:'✦';color:var(--rose);flex-shrink:0;font-size:.68rem;margin-top:3px}
.aff-banner{background:linear-gradient(135deg,#7a3f55,#c4768e);color:white;border-radius:16px;padding:22px;text-align:center;margin-top:8px}
.aff-banner .af-text{font-family:'Cormorant Garamond',serif;font-size:1.45rem;font-style:italic;line-height:1.4}
.aff-banner .af-sub{font-size:.77rem;opacity:.7;margin-top:7px;text-transform:uppercase;letter-spacing:2px}

/* ── CHAT – fully rebuilt ── */
.chat-page{display:flex;flex-direction:column;height:calc(100vh - 58px);max-width:740px;margin:0 auto;padding:0 20px}
.chat-topbar{flex-shrink:0;display:flex;align-items:center;gap:14px;padding:14px 0 10px;border-bottom:1px solid rgba(196,118,142,.12)}
.chat-avatar-big{width:48px;height:48px;border-radius:50%;background:linear-gradient(135deg,#e8c5d0,#c4768e);display:flex;align-items:center;justify-content:center;font-size:1.4rem;flex-shrink:0}
.chat-info{flex:1}
.chat-name{font-family:'Cormorant Garamond',serif;font-size:1.25rem;color:var(--deep)}
.chat-status{font-size:.75rem;color:var(--muted);display:flex;align-items:center;gap:5px;margin-top:2px}
.status-dot{width:7px;height:7px;background:#4caf50;border-radius:50%;animation:pulse 2s ease infinite}
@keyframes pulse{0%,100%{opacity:1}50%{opacity:.4}}
.chat-lang-pill{display:flex;gap:3px;background:#f0e6ea;border-radius:20px;padding:3px}
.chat-lang-btn{padding:4px 10px;border-radius:14px;border:none;background:transparent;font-size:.72rem;cursor:pointer;color:var(--muted);transition:all .2s}
.chat-lang-btn.active{background:var(--rose);color:white}
.messages-area{flex:1;overflow-y:auto;padding:14px 0;display:flex;flex-direction:column;gap:14px}
.messages-area::-webkit-scrollbar{width:3px}
.messages-area::-webkit-scrollbar-thumb{background:rgba(196,118,142,.3);border-radius:3px}
.msg-row{display:flex;gap:9px;align-items:flex-end;max-width:85%;animation:msgIn .3s ease}
@keyframes msgIn{from{opacity:0;transform:translateY(8px)}to{opacity:1;transform:translateY(0)}}
.msg-row.user{margin-left:auto;flex-direction:row-reverse}
.msg-ava{width:30px;height:30px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:.9rem;flex-shrink:0;background:linear-gradient(135deg,#e8c5d0,#c4768e)}
.msg-row.user .msg-ava{background:linear-gradient(135deg,#c4768e,#7a3f55)}
.msg-bub{padding:11px 15px;border-radius:16px;font-size:.91rem;line-height:1.65;word-break:break-word}
.msg-row.reena .msg-bub{background:rgba(255,255,255,.95);color:var(--text);border-radius:4px 16px 16px 16px;box-shadow:0 2px 8px rgba(122,63,85,.08)}
.msg-row.user .msg-bub{background:linear-gradient(135deg,#c4768e,#7a3f55);color:white;border-radius:16px 4px 16px 16px}
.msg-time{font-size:.64rem;color:var(--muted);margin-top:3px;padding:0 4px}
.msg-row.user .msg-time{text-align:right}
.typing-row{display:flex;gap:9px;align-items:flex-end}
.typing-bub{padding:12px 16px;background:rgba(255,255,255,.95);border-radius:4px 16px 16px 16px;box-shadow:0 2px 8px rgba(122,63,85,.08);display:flex;gap:5px;align-items:center}
.t-dot{width:7px;height:7px;background:var(--rose);border-radius:50%;animation:tdot 1.2s ease infinite}
.t-dot:nth-child(2){animation-delay:.2s}
.t-dot:nth-child(3){animation-delay:.4s}
@keyframes tdot{0%,80%,100%{transform:translateY(0)}40%{transform:translateY(-7px)}}
.quick-chips{flex-shrink:0;display:flex;gap:7px;flex-wrap:wrap;padding:8px 0 4px}
.quick-chip{padding:7px 14px;background:rgba(255,255,255,.85);border:1px solid rgba(196,118,142,.3);border-radius:50px;font-size:.78rem;color:var(--text);cursor:pointer;transition:all .2s;white-space:nowrap}
.quick-chip:hover{border-color:var(--rose);color:var(--rose)}
.chat-inputbar{flex-shrink:0;padding:8px 0 18px;display:flex;gap:9px;align-items:flex-end}
.chat-textarea{flex:1;padding:11px 16px;background:rgba(255,255,255,.9);border:1.5px solid rgba(196,118,142,.25);border-radius:22px;font-size:.92rem;color:var(--text);resize:none;outline:none;max-height:100px;transition:border-color .2s;line-height:1.5}
.chat-textarea:focus{border-color:var(--rose)}
.send-btn{width:42px;height:42px;background:linear-gradient(135deg,#c4768e,#7a3f55);border:none;border-radius:50%;cursor:pointer;display:flex;align-items:center;justify-content:center;transition:transform .2s;flex-shrink:0}
.send-btn:hover{transform:scale(1.07)}
.send-btn:disabled{opacity:.45;cursor:not-allowed;transform:none}

/* HEALTH SUMMARY */
.summary-grid{display:grid;grid-template-columns:1fr 1fr;gap:16px;margin-bottom:20px}
.summary-stat{background:white;border-radius:16px;padding:20px;text-align:center;border:1px solid rgba(196,118,142,.12)}
.summary-stat .sv{font-family:'Cormorant Garamond',serif;font-size:2rem;color:var(--deep)}
.summary-stat .sk{font-size:.74rem;color:var(--muted);text-transform:uppercase;letter-spacing:1px;margin-top:4px}
.log-entry{background:white;border-radius:14px;padding:16px 18px;border:1px solid rgba(196,118,142,.1);margin-bottom:10px;display:flex;align-items:flex-start;gap:12px}
.log-date-badge{background:linear-gradient(135deg,#f5dce4,#e8c5d0);border-radius:10px;padding:8px 12px;text-align:center;flex-shrink:0;min-width:52px}
.log-date-badge .ld{font-family:'Cormorant Garamond',serif;font-size:1.4rem;color:var(--deep);line-height:1}
.log-date-badge .lm{font-size:.68rem;color:var(--muted);text-transform:uppercase}
.log-body{flex:1}
.log-title{font-weight:600;font-size:.9rem;color:var(--deep);margin-bottom:4px}
.log-chips{display:flex;flex-wrap:wrap;gap:5px;margin-top:6px}
.log-chip{padding:3px 10px;background:#f5ecf0;border-radius:20px;font-size:.75rem;color:var(--deep)}
.log-mood-badge{padding:3px 10px;background:rgba(196,118,142,.12);border-radius:20px;font-size:.75rem;color:var(--deep);margin-left:auto;flex-shrink:0}
.add-log-form{background:white;border-radius:18px;padding:24px;border:1px solid rgba(196,118,142,.15);margin-bottom:24px}
.rc-textarea{width:100%;padding:12px 14px;border:1.5px solid #e2cfd5;border-radius:10px;font-size:.93rem;color:var(--text);background:white;outline:none;resize:vertical;min-height:80px;transition:border-color .2s}
.rc-textarea:focus{border-color:var(--rose)}
.tab-btns{display:flex;gap:8px;margin-bottom:20px;flex-wrap:wrap}
.tab-btn{padding:8px 18px;border-radius:50px;border:1.5px solid #e2cfd5;background:white;font-size:.83rem;color:var(--muted);cursor:pointer;transition:all .2s}
.tab-btn.active{background:var(--rose);color:white;border-color:var(--rose)}

/* REPORT */
.report-grid{display:grid;grid-template-columns:1fr 1fr;gap:16px;margin-bottom:20px}
.report-stat{background:white;border-radius:16px;padding:20px;text-align:center;border:1px solid rgba(196,118,142,.12)}
.report-stat .rs-val{font-family:'Cormorant Garamond',serif;font-size:2rem;color:var(--deep)}
.report-stat .rs-key{font-size:.75rem;color:var(--muted);text-transform:uppercase;letter-spacing:1px;margin-top:4px}
.report-month-btn{padding:8px 16px;border-radius:50px;border:1.5px solid #e2cfd5;background:white;font-size:.83rem;color:var(--text);cursor:pointer;transition:all .2s}
.report-month-btn.active{background:var(--rose);color:white;border-color:var(--rose)}
.pattern-bar-wrap{margin-bottom:12px}
.pattern-bar-label{font-size:.8rem;color:var(--muted);margin-bottom:4px;display:flex;justify-content:space-between}
.pattern-bar-bg{background:#f0e0e8;border-radius:4px;height:10px;overflow:hidden}
.pattern-bar-fill{height:100%;border-radius:4px;background:linear-gradient(90deg,#c4768e,#7a3f55);transition:width 1s ease}

/* INSIGHTS */
.insight-card{border-radius:16px;padding:20px;margin-bottom:14px;display:flex;gap:14px;align-items:flex-start}
.insight-card.normal{background:rgba(100,180,150,.1);border:1px solid rgba(100,180,150,.3)}
.insight-card.warning{background:rgba(255,180,50,.1);border:1px solid rgba(255,180,50,.3)}
.insight-icon{font-size:1.8rem;flex-shrink:0}
.insight-title{font-weight:600;font-size:.93rem;color:var(--deep);margin-bottom:4px}
.insight-desc{font-size:.85rem;color:var(--text);line-height:1.6}

/* REMINDERS */
.reminder-grid{display:grid;grid-template-columns:1fr 1fr;gap:14px}
.reminder-card{background:white;border-radius:16px;padding:20px;border:1px solid rgba(196,118,142,.12)}
.reminder-header{display:flex;align-items:center;justify-content:space-between;margin-bottom:12px}
.reminder-title{font-weight:600;font-size:.9rem;color:var(--deep);display:flex;align-items:center;gap:7px}
.toggle{width:44px;height:24px;border-radius:12px;border:none;cursor:pointer;position:relative;transition:background .3s;flex-shrink:0}
.toggle.on{background:var(--rose)}
.toggle.off{background:#ddd}
.toggle::after{content:'';position:absolute;width:18px;height:18px;background:white;border-radius:50%;top:3px;transition:left .3s;box-shadow:0 1px 4px rgba(0,0,0,.2)}
.toggle.on::after{left:23px}
.toggle.off::after{left:3px}
.time-input{padding:7px 10px;border:1.5px solid #e2cfd5;border-radius:8px;font-size:.85rem;color:var(--text);background:white;outline:none;width:100%;margin-top:8px}
.notif-banner{background:linear-gradient(135deg,rgba(196,118,142,.12),rgba(122,63,85,.06));border:1px solid rgba(196,118,142,.2);border-radius:14px;padding:16px 20px;margin-bottom:20px;display:flex;align-items:center;gap:12px;font-size:.88rem;color:var(--text)}

/* SPINNER */
.spinner{display:inline-block;width:32px;height:32px;border:3px solid rgba(196,118,142,.3);border-top-color:var(--rose);border-radius:50%;animation:spin .8s linear infinite}
@keyframes spin{to{transform:rotate(360deg)}}
.loading-screen{min-height:100vh;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:18px}
.loading-brand{font-family:'Cormorant Garamond',serif;font-size:2.8rem;font-weight:300;color:var(--deep)}
.loading-brand span{font-style:italic;color:var(--rose)}

@media(max-width:700px){
  .auth-wrap{grid-template-columns:1fr}.auth-left{display:none}.auth-right{padding:36px 20px}
  .tracker-grid,.care-grid,.report-grid,.reminder-grid,.summary-grid{grid-template-columns:1fr}
  .rc-nav{padding:10px 12px}.nav-links{gap:2px}.nav-btn{padding:5px 8px;font-size:.72rem}
  .rc-page{padding:20px 14px 50px}.aff-card{padding:28px 20px}
}

// ── Helpers ──
function addDays(d,n){const r=new Date(d);r.setDate(r.getDate()+n);return r;}
function fmtDate(d,o){return new Date(d).toLocaleDateString("en-US",o||{month:"long",day:"numeric",year:"numeric"});}
function nowTime(){return new Date().toLocaleTimeString([],{hour:"2-digit",minute:"2-digit"});}
function getInitials(n){return n?n.split(" ").map(w=>w[0]).join("").toUpperCase().slice(0,2):"U";}
function pwStrength(pw){if(!pw)return 0;let s=0;if(pw.length>=8)s++;if(/[A-Z]/.test(pw))s++;if(/[0-9]/.test(pw))s++;if(/[^A-Za-z0-9]/.test(pw))s++;return s;}
function friendlyError(code){
  const m={
    "auth/email-already-in-use":"This email is already registered. Please sign in instead.",
    "auth/invalid-email":"Please enter a valid email address.",
    "auth/weak-password":"Password must be at least 6 characters.",
    "auth/user-not-found":"No account found with this email. Did you mean to sign up?",
    "auth/wrong-password":"Incorrect password. Please try again or reset your password.",
    "auth/invalid-credential":"Incorrect email or password. Please check and try again.",
    "auth/too-many-requests":"Too many failed attempts. Please wait a few minutes and try again.",
    "auth/network-request-failed":"Network error. Please check your internet connection.",
    "auth/popup-blocked":"Popup was blocked. Please allow popups for this site and try again.",
    "auth/operation-not-allowed":"Email/password sign-in is not enabled. Please contact support.",
    "auth/missing-password":"Please enter your password.",
    "auth/missing-email":"Please enter your email address.",
  };
  return m[code]||("Something went wrong: "+code);
}

function TrackerPage({user, lang}) {
  const t = T[lang];
  const today = new Date().toISOString().split("T")[0];
  const [lastPeriod, setLastPeriod] = useState(today);
  const [cycleLen, setCycleLen] = useState(28);
  const [result, setResult] = useState(null);
  const [saved, setSaved] = useState(false);

  async function calculate(){
    const lp=new Date(lastPeriod),cd=parseInt(cycleLen);
    const next=addDays(lp,cd),ovul=addDays(lp,cd-14);
    const fs=addDays(ovul,-3),fe=addDays(ovul,1);
    const daysUntil=Math.ceil((next-new Date())/(1000*60*60*24));
    setResult({next,ovul,fs,fe,daysUntil,lp,cd});
    try{
      await db.collection("users").doc(user.uid).collection("cycles").add({lastPeriod,cycleLength:cd,nextPeriod:next.toISOString(),createdAt:firebase.firestore.FieldValue.serverTimestamp()});
      setSaved(true);setTimeout(()=>setSaved(false),3000);
    }catch(e){console.error(e);}
  }

  function CalView({lp,cd,next,ovul,fs,fe}){
    const tn=new Date(),yr=tn.getFullYear(),mo=tn.getMonth();
    const first=new Date(yr,mo,1),last=new Date(yr,mo+1,0);
    const ps=new Set();
    for(let i=0;i<5;i++){ps.add(addDays(lp,i).toDateString());ps.add(addDays(next,i).toDateString());}
    const days=[];
    for(let i=0;i<first.getDay();i++)days.push(null);
    for(let d=1;d<=last.getDate();d++){
      const date=new Date(yr,mo,d);let cls="cal-day";
      if(date.toDateString()===tn.toDateString())cls+=" today";
      if(ps.has(date.toDateString()))cls+=" period";
      else if(date.toDateString()===ovul.toDateString())cls+=" ovulation";
      else if(date>=fs&&date<=fe)cls+=" fertile";
      days.push({d,cls});
    }
    return(<div className="rc-card" style={{marginTop:"20px"}}>
      <div className="rc-card-title">📅 {fmtDate(first,{month:"long",year:"numeric"})}</div>
      <div className="cal-grid">{["Sun","Mon","Tue","Wed","Thu","Fri","Sat"].map(n=><div key={n} className="cal-day-name">{n}</div>)}{days.map((d,i)=>d?<div key={i} className={d.cls}>{d.d}</div>:<div key={i} className="cal-day"/>)}</div>
      <div className="cal-legend" style={{marginTop:"12px"}}>
        <span><span className="legend-dot" style={{background:"var(--rose)"}}/>Period</span>
        <span><span className="legend-dot" style={{background:"rgba(196,118,142,.4)"}}/>Today</span>
        <span><span className="legend-dot" style={{background:"rgba(100,180,150,.5)"}}/>Fertile</span>
        <span><span className="legend-dot" style={{background:"#9b59b6"}}/>Ovulation</span>
      </div>
    </div>);
  }

  return(<div className="rc-page">
    <div className="rc-page-header"><div className="rc-label">{t.knowYourBody}</div><h1 className="rc-page-title">{t.periodTracker}</h1><p className="rc-page-sub">{t.trackerSub}</p></div>
    {saved&&<div className="success-box" style={{maxWidth:"400px",margin:"0 auto 20px"}}>✅ Cycle data saved!</div>}
    <div className="tracker-grid">
      <div className="rc-card">
        <div className="rc-card-title">🗓️ {t.lastPeriod}</div>
        <div className="form-group"><label className="form-label">{t.lastPeriod}</label><input type="date" className="rc-input" style={{marginBottom:0}} value={lastPeriod} max={today} onChange={e=>setLastPeriod(e.target.value)}/></div>
        <div className="form-group"><label className="form-label">{t.cycleLength}</label>
          <select className="rc-select" value={cycleLen} onChange={e=>setCycleLen(e.target.value)}>
            {[20,21,24,26,28,30,31,35].map(n=><option key={n} value={n}>{n} days{n===28?" (avg)":""}</option>)}
          </select>
        </div>
        <button className="btn-rose" onClick={calculate}>{t.calculate}</button>
        <div className="tip-box" style={{marginTop:"16px"}}><strong>💡</strong> 21–35 days is perfectly normal!</div>
      </div>
      <div className="rc-card" style={{display:"flex",alignItems:"center",justifyContent:"center"}}>
        {result?(<div className="ring-wrap">
          <div className="ring-container">
            <svg className="ring-svg" width="150" height="150" viewBox="0 0 150 150">
              <circle fill="none" stroke="#f0e0e8" strokeWidth="8" cx="75" cy="75" r="65"/>
              <circle fill="none" stroke="var(--rose)" strokeWidth="8" cx="75" cy="75" r="65" strokeLinecap="round"
                strokeDasharray="408" strokeDashoffset={408-Math.min((result.cd-Math.max(result.daysUntil,0))/result.cd*408,408)}
                style={{transition:"stroke-dashoffset 1s ease"}}/>
            </svg>
            <div className="ring-text"><div className="ring-days">{Math.max(result.daysUntil,0)}</div><div className="ring-label">{t.daysAway}</div></div>
          </div>
        </div>):(<div style={{textAlign:"center",color:"var(--muted)",padding:"24px"}}><div style={{fontSize:"2.8rem",marginBottom:"10px"}}>🌸</div>Enter details to see predictions</div>)}
      </div>
    </div>
    {result&&(<>
      <div className="rc-card">
        <div className="rc-card-title">📊 Overview</div>
        <div className="result-grid">
          {[{ico:"🌙",val:fmtDate(result.next,{month:"short",day:"numeric"}),key:t.nextPeriod},{ico:"⏰",val:Math.max(result.daysUntil,0),key:t.daysAway},{ico:"🌸",val:fmtDate(result.ovul,{month:"short",day:"numeric"}),key:t.ovulation},{ico:"💚",val:fmtDate(result.fs,{month:"short",day:"numeric"})+"–"+fmtDate(result.fe,{month:"short",day:"numeric"}),key:t.fertileWindow}].map(r=>(
            <div key={r.key} className="result-pill"><div className="ico">{r.ico}</div><div className="val" style={{fontSize:r.key===t.fertileWindow?"1rem":"1.5rem"}}>{r.val}</div><div className="key">{r.key}</div></div>
          ))}
        </div>
      </div>
      <CalView lp={result.lp} cd={result.cd} next={result.next} ovul={result.ovul} fs={result.fs} fe={result.fe}/>
    </>)}
  </div>);
}

function SymptomsPage({user, lang}) {
  const t = T[lang];

  function toggle(id){setSel(p=>{const s=new Set(p);s.has(id)?s.delete(id):s.add(id);return s;});}

  async function analyze(){
    if(sel.size===0)return;setLoading(true);
    const syms=[...sel].join(", ");
    try{await db.collection("users").doc(user.uid).collection("symptoms").add({symptoms:[...sel],mood,date:new Date().toISOString(),createdAt:firebase.firestore.FieldValue.serverTimestamp()});}catch(e){}
    try{
      const raw=await callClaude(

      <label className="form-label">{t.moodToday}</label>
      <div className="mood-grid" style={{marginBottom:"24px"}}>{MOODS.map(m=><div key={m.val} className={"mood-option"+(mood===m.val?" selected":"")} onClick={()=>setMood(m.val)}><div style={{fontSize:"1.7rem"}}>{m.emoji}</div><div className="mood-name">{m.label}</div></div>)}</div>
      <button className="btn-rose" onClick={analyze} disabled={sel.size===0}>{t.getCarePlan}</button>

    {loading&&<div style={{textAlign:"center",padding:"50px"}}><div className="spinner"/><p style={{marginTop:"16px",color:"var(--muted)"}}>{t.preparingPlan}</p></div>}
    {plan&&(<>
      <div className="care-message">{plan.message}</div>

      <div className="aff-banner"><div className="af-text">{plan.affirmation}</div><div className="af-sub">{t.yourAffirmation}</div></div>
      <div style={{textAlign:"center",marginTop:"20px"}}><button className="btn-outline" onClick={()=>setPlan(null)}>{t.checkDiff}</button></div>
    </>)}

function ChatPage({user, lang}) {
  const t = T[lang];
  const firstName = (user.displayName||user.email||"Beautiful").split(" ")[0];
  const [chatLang, setChatLang] = useState(lang);
  const [messages, setMessages] = useState([{
    role:"reena",
    text: lang === "ta"
      ? "வணக்கம் "+firstName+"! 💕 நான் ரீனா. இன்று நீங்கள் எப்படி உணர்கிறீர்கள்? 🌸"
      : lang === "hi"
        ? "नमस्ते "+firstName+"! 💕 मैं रीना हूं। आज आप कैसा महसूस कर रही हैं? 🌸"
        : "Hi "+firstName+"! 💕 I'm Reena, your personal wellness companion. How are you feeling today? 🌸",
    time: nowTime()
  }]);
  const [input, setInput] = useState("");
  const [typing, setTyping] = useState(false);
  const [showQuick, setShowQuick] = useState(true);
  const historyRef = useRef([]);
  const endRef = useRef(null);
  const textareaRef = useRef(null);

  useEffect(()=>{endRef.current?.scrollIntoView({behavior:"smooth"});},[messages,typing]);

  // Language-specific system prompts
  function getSystemPrompt(lang) {
    if (lang === "ta") {
      return `உங்கள் பெயர் ரீனா. நீங்கள் பெண்களுக்கான ஒரு அன்பான, அக்கறையுள்ள AI ஆரோக்கிய நண்பர். 
IMPORTANT: Always respond in Tamil language (தமிழ்) only.
- மாதவிடாய் சுழற்சி, அறிகுறிகள், உணர்வுகள் மற்றும் பெண்களின் ஆரோக்கியம் பற்றி பேசுங்கள்
- முதலில் உணர்வுகளை ஏற்றுக்கொள்ளுங்கள், பின்னர் ஆலோசனை கூறுங்கள்
- 3-4 வாக்கியங்களில் பதிலளியுங்கள்
- எப்போதும் அன்பாகவும் ஆதரவாகவும் இருங்கள்`;
    } else if (lang === "hi") {
      return `आपका नाम रीना है। आप महिलाओं के लिए एक देखभाल करने वाली AI स्वास्थ्य सहेली हैं।
IMPORTANT: हमेशा हिंदी भाषा में ही जवाब दें।
- पीरियड, लक्षण, भावनाओं और महिला स्वास्थ्य के बारे में बात करें
- पहले भावनाओं को स्वीकार करें, फिर सलाह दें
- 3-4 वाक्यों में जवाब दें
- हमेशा गर्मजोशी और सहानुभूति से बात करें`;
    } else {
      return `Your name is Reena. You are a warm, caring AI wellness best friend for women.
- Talk about periods, symptoms, emotions, cycle phases, and women's health
- Always validate feelings first, then offer gentle advice
- Keep responses to 3-5 sentences — conversational and warm
- Be like a knowledgeable best friend, not a doctor
- If they share pain or struggles, empathize deeply before advising
- Respond in English`;
    }
  }

  // Quick chip messages per language
  const quickChips = {
    en: ["I have bad cramps 😣","I feel tired & emotional 😔","Tell me about my cycle 🌙","I need motivation today 💪","I feel anxious 😰","What foods help with PMS? 🥗"],
    ta: ["எனக்கு வயிற்று வலி இருக்கிறது 😣","நான் சோர்வாக உணர்கிறேன் 😔","என் சுழற்சி பற்றி சொல்லுங்கள் 🌙","எனக்கு ஊக்கம் தேவை 💪","PMS உணவுகள் என்ன? 🥗"],
    hi: ["मुझे बहुत दर्द हो रहा है 😣","मैं थकी हुई हूं 😔","मेरे चक्र के बारे में बताएं 🌙","आज मुझे प्रेरणा चाहिए 💪","PMS में क्या खाएं? 🥗"]
  };

  async function send(txt) {
    const text = (txt || input).trim();
    if (!text || typing) return;
    setInput("");
    setShowQuick(false);
    if (textareaRef.current) textareaRef.current.style.height = "auto";

    const userMsg = {role:"user", text, time:nowTime()};
    setMessages(prev => [...prev, userMsg]);
    historyRef.current.push({role:"user", content:text});
    setTyping(true);

    try {
      const reply = await callClaude(
        historyRef.current.slice(-12),
        getSystemPrompt(chatLang)
      );
      historyRef.current.push({role:"assistant", content:reply});
      setTyping(false);
      setMessages(prev => [...prev, {role:"reena", text:reply, time:nowTime()}]);
    } catch(e) {
      setTyping(false);
      console.error("Reena chat error:", e);
      setMessages(prev => [...prev, {role:"reena", text:"❌ Error: " + e.message, time:nowTime()}]);
    }
  }

  function handleLangChange(l) {
    setChatLang(l);
    historyRef.current = [];
    const greeting = l === "ta"
      ? "வணக்கம் "+firstName+"! 💕 நான் ரீனா. இப்போது தமிழில் பேசலாம். இன்று எப்படி உணர்கிறீர்கள்? 🌸"
      : l === "hi"
        ? "नमस्ते "+firstName+"! 💕 अब हम हिंदी में बात करेंगे। आज कैसा महसूस कर रही हैं? 🌸"
        : "Hi "+firstName+"! 💕 Switching to English. How are you feeling today? 🌸";
    setMessages([{role:"reena", text:greeting, time:nowTime()}]);
    setShowQuick(true);
  }

  return (
    <div className="chat-page">
      <div className="chat-topbar">
        <div className="chat-avatar-big">🌸</div>
        <div className="chat-info">
          <div className="chat-name">Reena</div>
          <div className="chat-status"><span className="status-dot"/>
            {chatLang === "ta" ? "எப்போதும் உங்களுக்காக" : chatLang === "hi" ? "हमेशा आपके लिए" : t.alwaysHere}
          </div>
        </div>
        <div className="chat-lang-pill">
          {["en","ta","hi"].map(l => (
            <button key={l} className={"chat-lang-btn"+(chatLang===l?" active":"")} onClick={()=>handleLangChange(l)}>
              {l==="en"?"EN":l==="ta"?"தமிழ்":"हिंदी"}
            </button>
          ))}
        </div>
      </div>

      <div className="messages-area">
        {messages.map((m,i) => (
          <div key={i} className={"msg-row "+m.role}>
            <div className="msg-ava">{m.role==="reena"?"🌸":"👤"}</div>
            <div>
              <div className="msg-bub" dangerouslySetInnerHTML={{__html: m.role==="reena"
                ? m.text.replace(/\n/g,"<br/>")
                : m.text.replace(/&/g,"&amp;").replace(/</g,"&lt;").replace(/>/g,"&gt;").replace(/\n/g,"<br/>")
              }}/>
              <div className="msg-time">{m.time}</div>
            </div>
          </div>
        ))}
        {typing && (
          <div className="typing-row">
            <div className="msg-ava">🌸</div>
            <div className="typing-bub"><div className="t-dot"/><div className="t-dot"/><div className="t-dot"/></div>
          </div>
        )}
        <div ref={endRef}/>
      </div>

      {showQuick && (
        <div className="quick-chips">
          {(quickChips[chatLang]||quickChips.en).map(q => (
            <div key={q} className="quick-chip" onClick={()=>send(q)}>{q}</div>
          ))}
        </div>
      )}

      <div className="chat-inputbar">
        <textarea
          ref={textareaRef}
          className="chat-textarea"
          rows={1}
          placeholder={chatLang==="ta"?"ரீனாவிடம் எதையும் கேளுங்கள்...":chatLang==="hi"?"रीना से कुछ भी पूछें...":"Ask Reena anything about your health..."}
          value={input}
          onChange={e=>{setInput(e.target.value);e.target.style.height="auto";e.target.style.height=Math.min(e.target.scrollHeight,100)+"px";}}
          onKeyDown={e=>{if(e.key==="Enter"&&!e.shiftKey){e.preventDefault();send();}}}
        />
        <button className="send-btn" onClick={()=>send()} disabled={!input.trim()||typing}>

        </button>

    </div>
  );
}

function HealthSummaryPage({user, lang}) {
  const t = T[lang];
  const today = new Date().toISOString().split("T")[0];
  const [logs, setLogs] = useState([]);
  const [loading, setLoading] = useState(true);
  const [showForm, setShowForm] = useState(false);
  const [saving, setSaving] = useState(false);
  const [saved, setSaved] = useState(false);
  const [viewMode, setViewMode] = useState("recent");

  // Form state
  const [logDate, setLogDate] = useState(today);
  const [logNotes, setLogNotes] = useState("");
  const [logSymptoms, setLogSymptoms] = useState(new Set());
  const [logMood, setLogMood] = useState("");
  const [logEnergy, setLogEnergy] = useState(3);
  const [logSleep, setLogSleep] = useState("");

  useEffect(()=>{loadLogs();},[user.uid]);

  async function loadLogs(){
    setLoading(true);
    // Load from localStorage first
    try{
      const local = JSON.parse(localStorage.getItem("reena_logs_"+user.uid)||"[]");
      if(local.length > 0){
        const sorted = local.sort((a,b)=>new Date(b.date)-new Date(a.date));
        setLogs(viewMode==="all" ? sorted.slice(0,50) : sorted.slice(0,7));
        setLoading(false);
      }
    }catch(e){console.error(e);}
    // Also try Firebase
    try{
      const snap = await db.collection("users").doc(user.uid).collection("healthLogs")
        .orderBy("date","desc").limit(viewMode==="all"?50:7).get();
      if(!snap.empty){
        setLogs(snap.docs.map(d=>({id:d.id,...d.data()})));
      }
    }catch(e){console.error(e);}
    setLoading(false);
  }

  useEffect(()=>{loadLogs();},[viewMode]);

  function toggleSym(id){setLogSymptoms(p=>{const s=new Set(p);s.has(id)?s.delete(id):s.add(id);return s;});}

  async function saveLog(){
    setSaving(true);
    const newLog = {
      id: Date.now().toString(),
      date:logDate,
      notes:logNotes,
      symptoms:[...logSymptoms],
      mood:logMood,
      energyLevel:logEnergy,
      sleepHours:logSleep,
      createdAt: new Date().toISOString()
    };
    // Save to localStorage first (always works)
    try{
      const existing = JSON.parse(localStorage.getItem("reena_logs_"+user.uid)||"[]");
      existing.unshift(newLog);
      localStorage.setItem("reena_logs_"+user.uid, JSON.stringify(existing));
    }catch(e){console.error("local save error",e);}
    // Try Firebase too
    try{
      await db.collection("users").doc(user.uid).collection("healthLogs").add({
        date:logDate,
        notes:logNotes,
        symptoms:[...logSymptoms],
        mood:logMood,
        energyLevel:logEnergy,
        sleepHours:logSleep,
        createdAt:firebase.firestore.FieldValue.serverTimestamp()
      });
    }catch(e){console.error("firebase save error",e);}
    setSaved(true);
    setShowForm(false);
    setLogNotes("");setLogSymptoms(new Set());setLogMood("");setLogEnergy(3);setLogSleep("");
    setTimeout(()=>setSaved(false),3000);
    loadLogs();
    setSaving(false);
  }

  const moodEmoji = {"very sad":"😭","tired":"😔","okay":"😐","irritable":"😠","anxious":"😰","good":"🙂","happy":"😊"};
  const energyLabel = ["","Very Low","Low","Okay","Good","High"];

  const totalLogs = logs.length;
  const avgEnergy = logs.length ? (logs.reduce((a,l)=>a+(l.energyLevel||0),0)/logs.length).toFixed(1) : "–";
  const allSymCount = {};
  logs.forEach(l=>(l.symptoms||[]).forEach(s=>{allSymCount[s]=(allSymCount[s]||0)+1;}));
  const topSym = Object.entries(allSymCount).sort((a,b)=>b[1]-a[1]).slice(0,1)[0];

  return(<div className="rc-page">
    <div className="rc-page-header">
      <div className="rc-label">{t.healthSummaryLabel}</div>
      <h1 className="rc-page-title">{t.healthSummaryTitle}</h1>
      <p className="rc-page-sub">{t.healthSummarySub}</p>
    </div>

    {saved&&<div className="success-box" style={{maxWidth:"500px",margin:"0 auto 20px"}}>{t.logSaved}</div>}

    {/* Stats */}
    <div className="summary-grid">
      <div className="summary-stat"><div className="sv">{totalLogs}</div><div className="sk">Total Logs</div></div>
      <div className="summary-stat"><div className="sv">{avgEnergy}</div><div className="sk">Avg Energy</div></div>
      <div className="summary-stat"><div className="sv">{topSym?topSym[0]:"–"}</div><div className="sk">Top Symptom</div></div>
      <div className="summary-stat"><div className="sv">{logs.filter(l=>l.mood==="happy"||l.mood==="good").length}</div><div className="sk">Good Days</div></div>
    </div>

    {/* Add Log Button */}
    {!showForm&&<div style={{textAlign:"center",marginBottom:"20px"}}>
      <button className="btn-rose" style={{width:"auto",padding:"14px 36px"}} onClick={()=>setShowForm(true)}>{t.addNewLog}</button>
    </div>}

    {/* Add Log Form */}
    {showForm&&(
      <div className="add-log-form">
        <div className="rc-card-title">📝 {t.addNewLog}</div>

        <div className="form-group">
          <label className="form-label">{t.logDate}</label>
          <input type="date" className="rc-input" style={{marginBottom:0}} value={logDate} max={today} onChange={e=>setLogDate(e.target.value)}/>
        </div>

        <div className="form-group">
          <label className="form-label">{t.logNotes}</label>
          <textarea className="rc-textarea" placeholder="Write how you're feeling today, any concerns, or anything on your mind..." value={logNotes} onChange={e=>setLogNotes(e.target.value)}/>
        </div>

        <div className="form-group">
          <label className="form-label">{t.logSymptoms}</label>
          <div className="symptom-grid">{SYMPTOMS.map(s=><div key={s.id} className={"symptom-pill"+(logSymptoms.has(s.id)?" selected":"")} onClick={()=>toggleSym(s.id)}>{s.label}</div>)}</div>
        </div>

        <div className="form-group">
          <label className="form-label">{t.logMood}</label>
          <div className="mood-grid">{MOODS.map(m=><div key={m.val} className={"mood-option"+(logMood===m.val?" selected":"")} onClick={()=>setLogMood(m.val)}><div style={{fontSize:"1.7rem"}}>{m.emoji}</div><div className="mood-name">{m.label}</div></div>)}</div>
        </div>

        <div className="form-group">
          <label className="form-label">Energy Level: {energyLabel[logEnergy]}</label>
          <input type="range" min="1" max="5" value={logEnergy} onChange={e=>setLogEnergy(parseInt(e.target.value))} style={{width:"100%",accentColor:"var(--rose)"}}/>
          <div style={{display:"flex",justifyContent:"space-between",fontSize:".72rem",color:"var(--muted)",marginTop:"4px"}}>
            <span>Very Low</span><span>Low</span><span>Okay</span><span>Good</span><span>High</span>
          </div>
        </div>

        <div className="form-group">
          <label className="form-label">Sleep Hours Last Night</label>
          <input type="number" className="rc-input" style={{marginBottom:0}} placeholder="e.g. 7.5" min="0" max="24" step="0.5" value={logSleep} onChange={e=>setLogSleep(e.target.value)}/>
        </div>

        <div style={{display:"flex",gap:"12px",marginTop:"8px"}}>
          <button className="btn-rose" onClick={saveLog} disabled={saving} style={{flex:1}}>
            {saving?<><div className="spinner" style={{width:"16px",height:"16px",borderWidth:"2px",marginRight:"8px"}}/>Saving...</>:t.saveLog}
          </button>
          <button className="btn-outline" onClick={()=>setShowForm(false)} style={{flex:1}}>Cancel</button>
        </div>
      </div>
    )}

    {/* View Toggle */}
    <div className="tab-btns">
      <button className={"tab-btn"+(viewMode==="recent"?" active":"")} onClick={()=>setViewMode("recent")}>Recent 7 Days</button>
      <button className={"tab-btn"+(viewMode==="all"?" active":"")} onClick={()=>setViewMode("all")}>{t.viewAll}</button>
    </div>

    {/* Logs List */}
    {loading?(<div style={{textAlign:"center",padding:"30px"}}><div className="spinner"/></div>):(
      logs.length===0
        ?(<div className="rc-card" style={{textAlign:"center",padding:"40px",color:"var(--muted)"}}><div style={{fontSize:"3rem",marginBottom:"12px"}}>📋</div><p>{t.noLogs}</p></div>)
        :(logs.map(log=>{
          const d = new Date(log.date);
          return(
            <div key={log.id} className="log-entry">
              <div className="log-date-badge">
                <div className="ld">{d.getDate()}</div>
                <div className="lm">{d.toLocaleDateString("en",{month:"short"})}</div>
              </div>
              <div className="log-body">
                <div style={{display:"flex",alignItems:"center",gap:"8px",flexWrap:"wrap"}}>
                  <div className="log-title">{d.toLocaleDateString("en",{weekday:"long"})}</div>
                  {log.mood&&<span className="log-mood-badge">{moodEmoji[log.mood]||"😐"} {log.mood}</span>}
                  {log.energyLevel&&<span style={{fontSize:".75rem",color:"var(--muted)"}}>⚡ Energy: {energyLabel[log.energyLevel]}</span>}
                  {log.sleepHours&&<span style={{fontSize:".75rem",color:"var(--muted)"}}>💤 Sleep: {log.sleepHours}h</span>}
                </div>
                {log.notes&&<div style={{fontSize:".86rem",color:"var(--text)",marginTop:"5px",lineHeight:"1.5"}}>{log.notes}</div>}
                {(log.symptoms||[]).length>0&&(
                  <div className="log-chips">
                    {(log.symptoms||[]).map(s=>{
                      const sym = SYMPTOMS.find(x=>x.id===s);
                      return <span key={s} className="log-chip">{sym?sym.label:s}</span>;
                    })}
                  </div>
                )}
              </div>
            </div>
          );
        }))
    )}
  </div>);
}

function ReportPage({user, lang}) {
  const t = T[lang];
  const [cycles, setCycles] = useState([]);
  const [symptoms, setSymptoms] = useState([]);
  const [healthLogs, setHealthLogs] = useState([]);
  const [loading, setLoading] = useState(true);
  const [generating, setGenerating] = useState(false);
  const [msg, setMsg] = useState("");
  const months=["January","February","March","April","May","June","July","August","September","October","November","December"];
  const [selMonth, setSelMonth] = useState(new Date().getMonth());

  useEffect(()=>{
    async function load(){
      try{
        const cSnap=await db.collection("users").doc(user.uid).collection("cycles").orderBy("createdAt","desc").limit(10).get();
        setCycles(cSnap.docs.map(d=>d.data()));
        const sSnap=await db.collection("users").doc(user.uid).collection("symptoms").orderBy("createdAt","desc").limit(20).get();
        setSymptoms(sSnap.docs.map(d=>d.data()));
        const lSnap=await db.collection("users").doc(user.uid).collection("healthLogs").orderBy("date","desc").limit(30).get();
        setHealthLogs(lSnap.docs.map(d=>d.data()));
      }catch(e){console.error(e);}
      setLoading(false);
    }
    load();
  },[user.uid]);

  async function downloadPDF(){
    if(cycles.length===0&&healthLogs.length===0){setMsg(t.noDataReport);return;}
    setGenerating(true);
    try{
      const {jsPDF}=window.jspdf;const doc=new jsPDF();
      const name=user.displayName||"User";const monthName=months[selMonth];
      doc.setFillColor(196,118,142);doc.rect(0,0,210,42,'F');
      doc.setTextColor(255,255,255);doc.setFontSize(26);doc.setFont("helvetica","bold");doc.text("ReenaCare",14,22);
      doc.setFontSize(12);doc.setFont("helvetica","normal");doc.text("Health Report — "+monthName+" "+new Date().getFullYear(),14,32);doc.text("User: "+name,14,40);
      doc.setTextColor(61,32,48);let y=56;
      // Cycle
      if(cycles.length>0){
        doc.setFontSize(15);doc.setFont("helvetica","bold");doc.text("🌙 Cycle Summary",14,y);y+=9;
        doc.setFontSize(10);doc.setFont("helvetica","normal");
        const lc=cycles[0];
        doc.text("Last Period: "+lc.lastPeriod,14,y);y+=6;
        doc.text("Cycle Length: "+lc.cycleLength+" days",14,y);y+=6;
        doc.text("Next Period (predicted): "+new Date(lc.nextPeriod).toLocaleDateString(),14,y);y+=6;
        doc.text("Total cycles logged: "+cycles.length,14,y);y+=12;
      }
      // Health Logs
      if(healthLogs.length>0){
        doc.setFontSize(15);doc.setFont("helvetica","bold");doc.text("📋 Health Log Summary",14,y);y+=9;
        doc.setFontSize(10);doc.setFont("helvetica","normal");
        const avgE=(healthLogs.reduce((a,l)=>a+(l.energyLevel||0),0)/healthLogs.length).toFixed(1);
        doc.text("Total logs: "+healthLogs.length,14,y);y+=6;
        doc.text("Average energy level: "+avgE+"/5",14,y);y+=6;
        const goodDays=healthLogs.filter(l=>l.mood==="happy"||l.mood==="good").length;
        doc.text("Good mood days: "+goodDays+" out of "+healthLogs.length,14,y);y+=12;
      }
      // Symptoms
      if(symptoms.length>0){
        doc.setFontSize(15);doc.setFont("helvetica","bold");doc.text("💊 Symptoms Logged",14,y);y+=9;
        doc.setFontSize(10);doc.setFont("helvetica","normal");
        const allSyms={};symptoms.forEach(s=>(s.symptoms||[]).forEach(sym=>{allSyms[sym]=(allSyms[sym]||0)+1;}));
        Object.entries(allSyms).sort((a,b)=>b[1]-a[1]).slice(0,8).forEach(([k,v])=>{doc.text("• "+k+": "+v+"x",14,y);y+=6;});
        y+=6;
      }
      doc.setFillColor(122,63,85);doc.rect(0,280,210,17,'F');
      doc.setTextColor(255,255,255);doc.setFontSize(9);
      doc.text("ReenaCare — Your AI Companion for Women's Wellness | Private & Confidential",14,290);
      doc.save("ReenaCare_Report_"+monthName+"_"+new Date().getFullYear()+".pdf");
      setMsg(t.reportReady);
    }catch(e){setMsg("Error generating report.");}
    setGenerating(false);
  }

  const allSyms={};symptoms.forEach(s=>(s.symptoms||[]).forEach(sym=>{allSyms[sym]=(allSyms[sym]||0)+1;}));
  const topSym=Object.entries(allSyms).sort((a,b)=>b[1]-a[1]).slice(0,3);

  return(<div className="rc-page">
    <div className="rc-page-header"><div className="rc-label">{t.reportLabel}</div><h1 className="rc-page-title">{t.healthReport}</h1><p className="rc-page-sub">{t.reportSub}</p></div>
    {loading?(<div style={{textAlign:"center",padding:"40px"}}><div className="spinner"/></div>):(<>
      <div className="report-grid">
        <div className="report-stat"><div className="rs-val">{cycles.length}</div><div className="rs-key">Cycles Logged</div></div>
        <div className="report-stat"><div className="rs-val">{symptoms.length}</div><div className="rs-key">{t.symptomsLogged}</div></div>
        <div className="report-stat"><div className="rs-val">{healthLogs.length}</div><div className="rs-key">Health Logs</div></div>
        <div className="report-stat"><div className="rs-val">{Object.keys(allSyms).length}</div><div className="rs-key">Unique Symptoms</div></div>
      </div>
      {topSym.length>0&&(<div className="rc-card"><div className="rc-card-title">🔝 Top Symptoms</div>
        {topSym.map(([sym,cnt])=>(<div key={sym} className="pattern-bar-wrap"><div className="pattern-bar-label"><span>{sym}</span><span>{cnt}x</span></div><div className="pattern-bar-bg"><div className="pattern-bar-fill" style={{width:Math.min(cnt*20,100)+"%"}}/></div></div>))}
      </div>)}
      <div className="rc-card">
        <div className="rc-card-title">{t.selectMonth}</div>
        <div style={{display:"flex",gap:"8px",flexWrap:"wrap",marginBottom:"20px"}}>
          {months.map((m,i)=><button key={i} className={"report-month-btn"+(selMonth===i?" active":"")} onClick={()=>setSelMonth(i)}>{m.slice(0,3)}</button>)}
        </div>
        {msg&&<div className={msg.includes("✅")||msg.includes("!")||msg.includes("downloaded")?"success-box":"error-box"} style={{marginBottom:"16px"}}>{msg}</div>}
        <button className="btn-rose" onClick={downloadPDF} disabled={generating}>
          {generating?<><div className="spinner" style={{width:"16px",height:"16px",borderWidth:"2px",marginRight:"8px"}}/>{t.generatingReport}</>:t.downloadPDF}
        </button>
      </div>
    </>)}
  </div>);
}

// INSIGHTS
// ════════════════════════════════
function InsightsPage({user, lang}) {
  const t = T[lang];
  const [cycles, setCycles] = useState([]);
  const [symptoms, setSymptoms] = useState([]);
  const [loading, setLoading] = useState(true);
  const [insights, setInsights] = useState(null);

  useEffect(()=>{
    async function load(){
      try{
        const cSnap=await db.collection("users").doc(user.uid).collection("cycles").orderBy("createdAt","desc").limit(6).get();
        setCycles(cSnap.docs.map(d=>d.data()));
        const sSnap=await db.collection("users").doc(user.uid).collection("symptoms").get();
        setSymptoms(sSnap.docs.map(d=>d.data()));
      }catch(e){}
      setLoading(false);
    }
    load();
  },[user.uid]);

  function analyze(){
    if(cycles.length<1){setInsights({error:t.insightsNoData});return;}
    const cycleLengths=cycles.map(c=>c.cycleLength);
    const avgLen=Math.round(cycleLengths.reduce((a,b)=>a+b,0)/cycleLengths.length);
    const maxDiff=Math.max(...cycleLengths)-Math.min(...cycleLengths);
    const isIrregular=maxDiff>7;
    const allSyms={};symptoms.forEach(s=>(s.symptoms||[]).forEach(sym=>{allSyms[sym]=(allSyms[sym]||0)+1;}));
    const frequent=Object.entries(allSyms).filter(([,v])=>v>=2).map(([k])=>k);
    const cards=[];
    cards.push(isIrregular
      ?{type:"warning",icon:"⚠️",title:t.irregularCycle,desc:"Your cycles vary by "+maxDiff+" days. Consider consulting a healthcare provider if this persists."}
      :{type:"normal",icon:"✅",title:t.regularCycle,desc:"Your average cycle is "+avgLen+" days. Your cycle is regular and healthy!"});
    if(frequent.includes("cramps")||frequent.includes("heavy_flow"))cards.push({type:"warning",icon:"🩸",title:"Frequent Pain Detected",desc:"You often experience cramps or heavy flow. Warm compresses and iron-rich foods may help."});
    if(frequent.includes("anxiety")||frequent.includes("mood_swings"))cards.push({type:"warning",icon:"💜",title:"Emotional Patterns",desc:"Mood changes are common before periods. Try journaling, light exercise, or talking to Reena."});
    if(frequent.includes("fatigue")||frequent.includes("low_energy"))cards.push({type:"normal",icon:"😴",title:"Energy Patterns",desc:"Fatigue is common mid-cycle. Prioritize sleep and B12-rich foods during this time."});
    if(cards.length===1)cards.push({type:"normal",icon:"🌸",title:"You're Doing Great!",desc:"No concerning patterns detected. Keep tracking for more personalized insights."});
    setInsights({cards,avgLen,isIrregular,cyclesLogged:cycles.length,symptomsLogged:symptoms.length,cycleLengths});
  }

  return(<div className="rc-page">
    <div className="rc-page-header"><div className="rc-label">{t.insightsLabel}</div><h1 className="rc-page-title">{t.cycleInsights}</h1><p className="rc-page-sub">{t.insightsSub}</p></div>
    {loading?(<div style={{textAlign:"center",padding:"40px"}}><div className="spinner"/></div>):(<>
      {!insights&&(<div className="rc-card" style={{textAlign:"center",padding:"40px"}}>
        <div style={{fontSize:"3rem",marginBottom:"16px"}}>🔍</div>
        <p style={{color:"var(--muted)",marginBottom:"24px"}}>Analyze {cycles.length} cycle{cycles.length!==1?"s":""} & {symptoms.length} symptom records</p>
        <button className="btn-rose" style={{width:"auto",padding:"14px 32px"}} onClick={analyze}>{t.analyzePatterns}</button>
      </div>)}
      {insights?.error&&<div className="error-box">{insights.error}</div>}
      {insights&&!insights.error&&(<>
        <div className="report-grid">
          <div className="report-stat"><div className="rs-val">{insights.avgLen}</div><div className="rs-key">{t.averageCycle} (days)</div></div>
          <div className="report-stat"><div className="rs-val">{insights.cyclesLogged}</div><div className="rs-key">Cycles Analyzed</div></div>
          <div className="report-stat"><div className="rs-val">{insights.symptomsLogged}</div><div className="rs-key">{t.symptomsLogged}</div></div>
          <div className="report-stat"><div className="rs-val">{insights.isIrregular?"⚠️":"✅"}</div><div className="rs-key">Cycle Status</div></div>
        </div>
        {insights.cycleLengths.length>1&&(<div className="rc-card"><div className="rc-card-title">📈 Cycle Length History</div>
          {insights.cycleLengths.map((len,i)=>(<div key={i} className="pattern-bar-wrap"><div className="pattern-bar-label"><span>Cycle {insights.cycleLengths.length-i}</span><span>{len} days</span></div><div className="pattern-bar-bg"><div className="pattern-bar-fill" style={{width:(len/42*100)+"%"}}/></div></div>))}
        </div>)}
        <div className="rc-card"><div className="rc-card-title">💡 AI Insights</div>
          {insights.cards.map((c,i)=>(<div key={i} className={"insight-card "+c.type}><div className="insight-icon">{c.icon}</div><div><div className="insight-title">{c.title}</div><div className="insight-desc">{c.desc}</div></div></div>))}
        </div>
        <div style={{textAlign:"center",marginTop:"10px"}}><button className="btn-outline" onClick={()=>setInsights(null)}>🔄 Re-analyze</button></div>
      </>)}
    </>)}
  </div>);
}

// ════════════════════════════════
// REMINDERS
// ════════════════════════════════
function RemindersPage({user, lang}) {
  const t = T[lang];
  const [notifStatus, setNotifStatus] = useState(typeof Notification!=="undefined"?Notification.permission:"default");
  const [saved, setSaved] = useState(false);
  const [reminders, setReminders] = useState({
    period:{on:true,daysBefore:2,time:"08:00"},
    ovulation:{on:true,daysBefore:0,time:"09:00"},
    water:{on:false,time:"10:00"},
    exercise:{on:false,time:"07:00"},
  });

  useEffect(()=>{
    db.collection("users").doc(user.uid).collection("settings").doc("reminders").get()
      .then(d=>{if(d.exists)setReminders(d.data());}).catch(()=>{});
  },[user.uid]);

  async function requestNotif(){
    if(!("Notification" in window)){alert("Browser doesn't support notifications.");return;}
    const perm=await Notification.requestPermission();setNotifStatus(perm);
    if(perm==="granted")new Notification("ReenaCare 🌸",{body:"Notifications enabled!"});
  }

  function toggleR(k){setReminders(p=>({...p,[k]:{...p[k],on:!p[k].on}}));}
  function setTime(k,v){setReminders(p=>({...p,[k]:{...p[k],time:v}}));}
  function setDays(k,v){setReminders(p=>({...p,[k]:{...p[k],daysBefore:parseInt(v)}}));}

  async function save(){
    try{
      await db.collection("users").doc(user.uid).collection("settings").doc("reminders").set({...reminders,updatedAt:firebase.firestore.FieldValue.serverTimestamp()});
      setSaved(true);setTimeout(()=>setSaved(false),3000);
    }catch(e){console.error(e);}
  }

  return(<div className="rc-page">
    <div className="rc-page-header"><div className="rc-label">{t.remindersLabel}</div><h1 className="rc-page-title">{t.remindersTitle}</h1><p className="rc-page-sub">{t.remindersSub}</p></div>
    <div className="notif-banner">
      <span style={{fontSize:"1.5rem"}}>🔔</span>
      <div style={{flex:1}}>
        <div style={{fontWeight:600,marginBottom:"4px"}}>Browser Notifications</div>
        <div style={{fontSize:".83rem",color:"var(--muted)"}}>{notifStatus==="granted"?t.notifGranted:notifStatus==="denied"?t.notifDenied:"Enable to get reminders on time."}</div>
      </div>
      {notifStatus!=="granted"&&notifStatus!=="denied"&&<button className="btn-rose" style={{width:"auto",padding:"10px 16px",fontSize:".83rem"}} onClick={requestNotif}>{t.enableNotif}</button>}
    </div>
    {saved&&<div className="success-box" style={{marginBottom:"16px"}}>{t.remindersSaved}</div>}
    <div className="reminder-grid">
      {[{key:"period",icon:"🩸",title:t.periodReminder,hasDays:true},{key:"ovulation",icon:"🌸",title:t.ovulationReminder,hasDays:true},{key:"water",icon:"💧",title:t.waterReminder,hasDays:false},{key:"exercise",icon:"🏃",title:t.exerciseReminder,hasDays:false}].map(c=>(
        <div key={c.key} className="reminder-card">
          <div className="reminder-header">
            <div className="reminder-title">{c.icon} {c.title}</div>
            <button className={"toggle "+(reminders[c.key].on?"on":"off")} onClick={()=>toggleR(c.key)}/>
          </div>
          {reminders[c.key].on&&(<>
            <label className="form-label" style={{marginTop:"8px"}}>Reminder Time</label>
            <input type="time" className="time-input" value={reminders[c.key].time} onChange={e=>setTime(c.key,e.target.value)}/>
            {c.hasDays&&(<>
              <label className="form-label" style={{marginTop:"10px"}}>{t.daysBefore}</label>
              <select className="rc-select" style={{marginTop:"6px"}} value={reminders[c.key].daysBefore} onChange={e=>setDays(c.key,e.target.value)}>
                {[0,1,2,3,5,7].map(n=><option key={n} value={n}>{n===0?"Same day":n+" "+t.daysBefore}</option>)}
              </select>
            </>)}
          </>)}
        </div>
      ))}
    </div>
    <div style={{textAlign:"center",marginTop:"24px"}}>
      <button className="btn-rose" style={{width:"auto",padding:"14px 40px"}} onClick={save}>{t.saveReminders}</button>
    </div>
  </div>);
}

// ════════════════════════════════
// APP ROOT
// ════════════════════════════════
function App() {
  const [authState, setAuthState] = useState("loading");
  const [user, setUser] = useState(null);
  const [page, setPage] = useState("home");
  const [menuOpen, setMenuOpen] = useState(false);
  const [lang, setLang] = useState("en");
  const menuRef = useRef(null);

  useEffect(()=>{
    const unsub = auth.onAuthStateChanged(u=>{setUser(u);setAuthState(u?"authenticated":"unauthenticated");});
    return()=>unsub();
  },[]);

  useEffect(()=>{
    if(user){
      db.collection("users").doc(user.uid).collection("settings").doc("preferences").get()
        .then(d=>{if(d.exists&&d.data().lang)setLang(d.data().lang);}).catch(()=>{});
    }
  },[user]);

  async function changeLang(l){
    setLang(l);
    if(user){
      try{await db.collection("users").doc(user.uid).collection("settings").doc("preferences").set({lang:l},{merge:true});}catch(e){}
    }
  }

  useEffect(()=>{
    function h(e){if(menuRef.current&&!menuRef.current.contains(e.target))setMenuOpen(false);}
    document.addEventListener("mousedown",h);return()=>document.removeEventListener("mousedown",h);
  },[]);

  const t = T[lang];

  if(authState==="loading") return(
    <div className="loading-screen">
      <div style={{fontSize:"3rem"}}>🌸</div>
      <div className="loading-brand">Reena<span>Care</span></div>
      <div style={{fontSize:".84rem",color:"var(--muted)",letterSpacing:"2px"}}>{t.loading}</div>
      <div className="spinner" style={{marginTop:"16px"}}/>
    </div>
  );

  if(authState==="unauthenticated") return <AuthPage onAuth={u=>{setUser(u);setAuthState("authenticated");}} lang={lang}/>;

  const pages=[
    {p:"home",label:t.home},{p:"tracker",label:t.tracker},{p:"symptoms",label:t.symptoms},
    {p:"chat",label:t.chat},{p:"summary",label:t.summary},{p:"report",label:t.report},
    {p:"insights",label:t.insights},{p:"reminders",label:t.reminders}
  ];

  return(<div>
    <nav className="rc-nav">
      <div className="rc-brand">Reena<span>Care</span></div>
      <div className="nav-links">
        {pages.map(n=><button key={n.p} className={"nav-btn"+(page===n.p?" active":"")} onClick={()=>setPage(n.p)}>{n.label}</button>)}
        <div className="lang-switcher" style={{marginLeft:"6px"}}>
          {["en","ta","hi"].map(l=><button key={l} className={"lang-btn"+(lang===l?" active":"")} onClick={()=>changeLang(l)}>{l==="en"?"EN":l==="ta"?"தமிழ்":"हिंदी"}</button>)}
        </div>
        <div ref={menuRef} className="nav-avatar" onClick={()=>setMenuOpen(p=>!p)}>
          {user.photoURL?<img src={user.photoURL} alt="av" style={{width:"100%",height:"100%",borderRadius:"50%",objectFit:"cover"}}/>:getInitials(user.displayName||user.email)}
          {menuOpen&&(<div className="user-menu">
            <div className="user-menu-name"><strong>{user.displayName||"User"}</strong>{user.email}</div>
            {pages.slice(0,5).map(n=><div key={n.p} className="user-menu-item" onClick={()=>{setMenuOpen(false);setPage(n.p);}}>{n.label}</div>)}
            <div className="user-menu-item danger" onClick={()=>{setMenuOpen(false);auth.signOut();}}>{t.signOut}</div>
          </div>)}
        </div>
      </div>
    </nav>
    {page==="home"&&<HomePage user={user} setPage={setPage} lang={lang}/>}
    {page==="tracker"&&<TrackerPage user={user} lang={lang}/>}
    {page==="symptoms"&&<SymptomsPage user={user} lang={lang}/>}
    {page==="chat"&&<ChatPage user={user} lang={lang}/>}
    {page==="summary"&&<HealthSummaryPage user={user} lang={lang}/>}
    {page==="report"&&<ReportPage user={user} lang={lang}/>}
    {page==="insights"&&<InsightsPage user={user} lang={lang}/>}
    {page==="reminders"&&<RemindersPage user={user} lang={lang}/>}
  </div>);
}

ReactDOM.render(<App/>, document.getElementById("root"));
</script>
</body>
</html>
